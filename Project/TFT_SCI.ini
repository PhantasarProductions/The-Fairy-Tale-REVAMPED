*list:DESCRIPTION
	Ten thousand years of war plagued Delisto and Kokonora, two giant continents on Phantasar.
	Humans, Fairies, Dwarves and Elves are at war.
	It's here we meet Jake and Marrilona, two lovers who were supposed to be enemies.
	According to legend their actions would revive the all destroying black dragon, but things don't seem right.
	Join these two lovers and their friends Dandor and Hando Stillor and uncover the secrets Phantasar has been hiding for so long
	in this exciting fantasy RPG.
*end
